<app-hero-section></app-hero-section>

<div class="min-h-screen bg-[#F0F0DB] p-4 sm:p-6">
    <!-- Blog Grid -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 sm:gap-6">
        <app-blog-card *ngFor="let blog of blogs$ | async" [title]="blog.title" [description]="blog.description"
            [imageUrl]="blog.imageUrl" (readMore)="openBlog(blog)" class="relative w-full">
            <!-- Edit/Delete Buttons (admin only) -->
            <div *ngIf="auth.isAdmin()" class="absolute top-2 right-2 flex gap-2 z-20 pointer-events-auto">
                <!-- Edit -->
                <div (click)="$event.stopPropagation()">
                    <app-button (clickEvent)="editBlog(blog)"
                        class="bg-[#30364F] text-white p-2 rounded-full flex items-center justify-center hover:bg-[#232942] transition w-9 h-9 sm:w-10 sm:h-10">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 sm:h-8 sm:w-8" fill="none"
                            viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M11 5H6a2 2 0 00-2 2v12a2 2 0 002 2h12a2 2 0 002-2v-5m-5-5l5-5m-5 5h5v5" />
                        </svg>
                    </app-button>
                </div>

                <!-- Delete -->
                <div (click)="$event.stopPropagation()">
                    <app-button (clickEvent)="deleteBlog(blog.id!)"
                        class="bg-red-600 text-white p-2 rounded-full flex items-center justify-center hover:bg-red-700 transition w-9 h-9 sm:w-10 sm:h-10">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 sm:h-8 sm:w-8" fill="none"
                            viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5-4h4m-4 0a1 1 0 00-1 1v1h6V4a1 1 0 00-1-1m-4 0h4" />
                        </svg>
                    </app-button>
                </div>
            </div>
        </app-blog-card>
    </div>

    <!-- Modal for Selected Blog -->
    <app-blog-modal [blog]="selectedBlog" (closeEvent)="closeModal()"></app-blog-modal>
</div>
