<app-hero-section></app-hero-section>

<div class="min-h-screen bg-[#F0F0DB] p-6">

    <!-- Blog Grid -->
    <div class="grid md:grid-cols-3 gap-6">

        @for (blog of blogs; track blog.id) {
        <app-blog-card [title]="blog.title" [description]="blog.description" [imageUrl]="blog.imageUrl"
            (readMore)="openBlog(blog)" class="relative">

            <!-- Edit/Delete Buttons (top-right corner) -->
            <div class="absolute top-2 right-2 flex gap-2 z-20 pointer-events-auto">
                <!-- Edit -->
                <div (click)="$event.stopPropagation()">
                    <app-button (clickEvent)="editBlog(blog)"
                        class="bg-[#30364F] text-white p-2 rounded-full flex items-center justify-center hover:bg-[#232942] transition w-10 h-10">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M11 5H6a2 2 0 00-2 2v12a2 2 0 002 2h12a2 2 0 002-2v-5m-5-5l5-5m-5 5h5v5" />
                        </svg>
                    </app-button>
                </div>

                <!-- Delete -->
                <div (click)="$event.stopPropagation()">
                    <app-button (clickEvent)="deleteBlog(blog.id!)"
                        class="bg-red-600 text-white p-2 rounded-full flex items-center justify-center hover:bg-red-700 transition w-10 h-10">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5-4h4m-4 0a1 1 0 00-1 1v1h6V4a1 1 0 00-1-1m-4 0h4" />
                        </svg>
                    </app-button>
                </div>
            </div>

        </app-blog-card>
        }

    </div>

    <!-- Modal for Selected Blog -->
    @if (selectedBlog) {
    <div class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
        <div class="bg-[#E1D9BC] rounded-2xl p-6 max-w-xl w-full max-h-[80vh] flex flex-col relative">

            <!-- Close Button -->
            <app-button (clickEvent)="closeModal()"
                class="absolute top-3 right-3 text-red-500 font-bold text-3xl hover:text-red-700 hover:scale-110 transition duration-200 w-10 h-10 flex items-center justify-center p-0 bg-transparent leading-none">
                ×
            </app-button>

            <!-- Title Section -->
            <div class="mb-4 border-b pb-2">
                <h2 class="text-2xl font-bold">{{ selectedBlog.title }}</h2>
            </div>

            <!-- Image Section -->
            <div class="mb-4 border-b pb-2">
                <img [src]="selectedBlog.imageUrl" class="w-full h-64 object-cover rounded" />
            </div>

            <!-- Description Section -->
            <div class="overflow-y-auto flex-1 pt-2">
                <p class="whitespace-pre-line">{{ selectedBlog.description }}</p>
            </div>

        </div>
    </div>
    }

</div>
