<div class="min-h-screen bg-[#F0F0DB] flex items-center justify-center p-4 sm:p-6">
    <div class="w-full max-w-md sm:max-w-lg lg:max-w-xl bg-[#E1D9BC] p-6 sm:p-8 rounded-2xl shadow-lg">
        <h2 class="text-2xl sm:text-3xl font-bold text-[#30364F] mb-6 sm:mb-8 text-center">
            {{ isEditMode ? 'Edit Blog Post' : 'Create Blog Post' }}
        </h2>

        <app-base-input label="Blog Title" placeholder="Enter blog title" [(ngModel)]="title"></app-base-input>

        <app-image-input label="Upload Blog Image" [previewUrl]="image || null"
            (fileSelected)="onImageSelected($event)"></app-image-input>

        <app-textarea label="Blog Content" placeholder="Write your blog content"
            [(ngModel)]="description"></app-textarea>

        <div class="mt-6">
            <app-button [text]="isEditMode ? 'Save Changes' : 'Publish'" [class]="
          isEditMode
            ? 'bg-[#005F02] hover:bg-[#427A43] text-white px-4 py-2 rounded w-full'
            : 'bg-[#30364f] hover:bg-[#355872] text-white px-4 py-2 rounded w-full'
        " (clickEvent)="submitPost()"></app-button>
        </div>
    </div>
</div>
