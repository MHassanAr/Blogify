<nav class="bg-[#30364F] text-[#F0F0DB] px-4 sm:px-6 py-4">
    <div class="flex items-center justify-between">
        <!-- Logo -->
        <div class="text-xl font-bold">
            My Blog
        </div>

        <!-- Desktop Menu -->
        <div class="hidden lg:flex justify-center space-x-6">
            @for (item of visibleNavItems; track item.link) {
            <a [routerLink]="item.link" class="hover:text-[#ACBAC4]">{{ item.label }}</a>
            }
        </div>

        <!-- Right side (Desktop) -->
        <div class="hidden lg:flex justify-end space-x-4 items-center">
            @if (auth.isLoggedIn()) {
            <button (click)="logout()" class="hover:text-[#ACBAC4]">Logout</button>
            }
        </div>

        <!-- Hamburger (Mobile/Tablet) -->
        <button type="button"
            class="lg:hidden inline-flex items-center justify-center p-2 rounded hover:text-[#ACBAC4] focus:outline-none"
            (click)="isMenuOpen = true" aria-label="Open menu">
            <svg class="h-6 w-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
            </svg>
        </button>
    </div>

    <!-- Fullscreen Mobile Menu Overlay -->
    @if (isMenuOpen) {
    <div class="fixed inset-0 z-50 bg-[#30364F] text-[#F0F0DB] p-6 flex flex-col">
        <!-- Top bar -->
        <div class="flex items-center justify-between">
            <div class="text-xl font-bold">My Blog</div>

            <button type="button"
                class="inline-flex items-center justify-center p-2 rounded hover:text-[#ACBAC4] focus:outline-none"
                (click)="isMenuOpen = false" aria-label="Close menu">
                <svg class="h-6 w-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>

        <!-- Links -->
        <div class="mt-10 flex flex-col gap-6 text-lg">
            @for (item of visibleNavItems; track item.link) {
            <a [routerLink]="item.link" class="hover:text-[#ACBAC4]" (click)="isMenuOpen = false">
                {{ item.label }}
            </a>
            }

            @if (auth.isLoggedIn()) {
            <button (click)="logout(); isMenuOpen = false" class="hover:text-[#ACBAC4] text-left">
                Logout
            </button>
            }
        </div>
    </div>
    }
</nav>
