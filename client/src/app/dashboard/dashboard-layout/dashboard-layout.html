<nav class="bg-[#30364F] text-[#F0F0DB] px-6 py-4 flex items-center">

    <!-- Logo -->
    <div class="w-1/3 text-xl font-bold">
        My Blog
    </div>

    <!-- Menu -->
    <div class="w-1/3 flex justify-center space-x-6">
        @for (item of visibleNavItems; track item.link) {
        <a [routerLink]="item.link" class="hover:text-[#ACBAC4]">{{ item.label }}</a>
        }
    </div>

    <!-- Right side -->
    <div class="w-1/3 flex justify-end space-x-4 items-center">
        @if (auth.isLoggedIn()) {
        <button (click)="logout()" class="hover:text-[#ACBAC4]">Logout</button>
        }
    </div>

</nav>
