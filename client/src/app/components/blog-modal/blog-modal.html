@if (blog) {
<div class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
    <div class="bg-[#E1D9BC] rounded-2xl p-6 max-w-xl w-full max-h-[80vh] flex flex-col relative">

        <app-button (clickEvent)="close()" class="absolute top-3 right-3 text-red-500 hover:text-[#D73535] font-bold text-3xl">×</app-button>

        <div class="mb-4 border-b pb-2">
            <h2 class="text-2xl font-bold">{{ blog.title }}</h2>
        </div>

        <div class="mb-4 border-b pb-2">
            <img [src]="blog.imageUrl" class="w-full h-64 object-cover rounded" />
        </div>

        <div class="overflow-y-auto flex-1 pt-2">
            <p class="whitespace-pre-line">{{ blog.description }}</p>
        </div>

    </div>
</div>
}
