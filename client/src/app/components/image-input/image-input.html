<div class="mb-4">

    <label class="block font-medium mb-2">
        {{ label }}
    </label>

    <input type="file" accept="image/*" (change)="onFileChange($event)" class="w-full border p-3 rounded mb-3" />

    @if (previewUrl) {
    <img [src]="previewUrl" class="w-full h-48 object-cover rounded shadow" />
    }

</div>
