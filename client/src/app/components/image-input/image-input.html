<div class="mb-4">
    <label class="block font-medium mb-2">{{ label }}</label>

    <input type="file" accept="image/*" (change)="onFileChange($event)" class="w-full border p-3 rounded mb-3" />

    @if (previewUrl) {
    <div class="relative">
        <img [src]="previewUrl" class="w-full h-48 object-cover rounded shadow" />

        <div class="absolute top-2 right-2 z-10">
            <app-button text="View" [btnClass]="'bg-[#30364f] hover:bg-[#355872] text-white px-3 py-1 rounded shadow'"
                (clickEvent)="openPreview()"></app-button>
        </div>
    </div>
    }

    @if (isPreviewOpen && previewUrl) {
    <!-- Backdrop -->
    <div class="fixed inset-0 bg-black/70 z-50 flex items-center justify-center p-4" (click)="closePreview()">
        <!-- Modal -->
        <div class="bg-[#E1D9BC] rounded-lg shadow-xl max-w-4xl w-full p-3" (click)="$event.stopPropagation()">
            <div class="flex justify-end mb-2">
                <app-button text="Close"
                    [btnClass]="'bg-red-600 hover:bg-red-700 text-white px-3 py-1 rounded shadow'"
                    (clickEvent)="closePreview()"></app-button>
            </div>

            <img [src]="previewUrl" class="w-full max-h-[75vh] object-contain rounded" />
        </div>
    </div>
    }
</div>
