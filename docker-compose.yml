services:
  mongo:
    image: mongo:6.0
    container_name: blog_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    ports:
      - "${MONGO_PORT}:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    container_name: blog_backend
    restart: unless-stopped
    env_file: .env
    ports:
      - "${BACKEND_PORT}:8000"
    depends_on:
      - mongo

  mailpit:
    image: axllent/mailpit
    container_name: blog_mailpit
    ports:
      - "${MAILPIT_PORT}:8025"

volumes:
  mongo_data: